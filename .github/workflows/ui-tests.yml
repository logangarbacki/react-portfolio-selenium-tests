name: Selenium UI Tests

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [run-selenium-tests]
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC

permissions:
  contents: write

jobs:
  run-selenium-tests:
    runs-on: windows-latest

    steps:
      - name: Checkout Selenium Tests Repo
        uses: actions/checkout@v3

      - name: Checkout React Portfolio Repo
        uses: actions/checkout@v3
        with:
          repository: logangarbacki/react-portfolio-website
          token: ${{ secrets.PORTFOLIO_REPO_PAT }}
          path: portfolio

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies
        run: dotnet restore ./SeleniumTestFramework.csproj

      - name: Build Selenium Project
        run: dotnet build --no-restore ./SeleniumTestFramework.csproj

      - name: Run Selenium Tests
        run: dotnet test ./SeleniumTestFramework.csproj --logger "console;verbosity=normal"
        continue-on-error: true
        env:
          ALLURE_RESULTS_DIRECTORY: allure-results

      - name: List allure-results
        run: dir allure-results || echo "allure-results not found"

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Generate Allure Report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages