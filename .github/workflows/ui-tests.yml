name: Run Navbar Selenium Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  selenium-tests:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore ./SeleniumTestFramework/SeleniumTestFramework.csproj

    - name: Build project
      run: dotnet build ./SeleniumTestFramework/SeleniumTestFramework.csproj --no-restore

    - name: Run Selenium tests
      run: dotnet run --project ./SeleniumTestFramework/SeleniumTestFramework.csproj